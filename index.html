<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>沖縄 — Family Trip 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root{
  --white:#ffffff;
  --black:#1d1d1f;
  --gray-1:#6e6e73;
  --gray-2:#86868b;
  --gray-bg:#f5f5f7;
  --line:rgba(0,0,0,.08);
  --blue:#0071e3;
  --blue-d:#0058b3;
  --fs-scale:1;
}

/* ── Accent themes (Apple-style product colors) ── */
html[data-theme="blue"]{ --blue:#0071e3; }
html[data-theme="green"]{ --blue:#1d8a3e; }
html[data-theme="orange"]{ --blue:#d9650f; }
html[data-theme="pink"]{ --blue:#c4427a; }
html[data-theme="purple"]{ --blue:#7d5ec4; }

/* ── Dark mode ── */
html[data-mode="dark"]{
  --white:#000000;
  --black:#f5f5f7;
  --gray-1:#a1a1a6;
  --gray-2:#86868b;
  --gray-bg:#1c1c1e;
  --line:rgba(255,255,255,.12);
}
html[data-mode="dark"] .map-dark{ background:#000; }
html[data-mode="dark"] .pill-tel{ background:#2c2c2e; color:#f5f5f7; }
html[data-mode="dark"] .pill-note{ background:#2c2c2e; color:#a1a1a6; }
html[data-mode="dark"] .res-id{ background:#2c2c2e; color:#f5f5f7; }
html[data-mode="dark"] .res-id:hover{ background:#3a3a3c; }
html[data-mode="dark"] .nav{ background:rgba(0,0,0,.8); }
html[data-mode="dark"] .progress-wrap{ background:rgba(0,0,0,.85); }
html[data-mode="dark"] .progress-track{ background:#2c2c2e; }
html[data-mode="dark"] .day-hotel-tag{ background:#1c1c1e; }
html[data-mode="dark"] .ev-check{ background:#000; }
html[data-mode="dark"] .map-card{ background:#1c1c1e; }
html[data-mode="dark"] .map-card:hover{ background:#2c2c2e; }
html[data-mode="dark"] .status-confirmed{ background:#0e2818; }
html[data-mode="dark"] .status-check{ background:#2e2210; }
html[data-mode="dark"] .res-id.copied{ background:#0e2818; color:#34c759; }

*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
html{scroll-behavior:smooth;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter','Hiragino Kaku Gothic ProN','Helvetica Neue',sans-serif;
  background:var(--white);color:var(--black);
  font-size:calc(17px * var(--fs-scale));line-height:1.47;
  -webkit-text-size-adjust:100%;
  transition:background .25s,color .25s;
}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ════════ NAV ════════ */
.nav{
  position:sticky;top:0;z-index:500;
  background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--line);
  height:48px;display:flex;align-items:center;justify-content:center;
}
.nav-inner{
  width:100%;max-width:980px;display:flex;align-items:center;
  justify-content:space-between;padding:0 22px;
}
.nav-logo{font-size:13px;font-weight:600;letter-spacing:-.2px;}
.nav-links{display:flex;gap:28px;}
.nav-links button{
  font-size:12px;color:var(--black);font-weight:400;opacity:.8;transition:opacity .15s;
  background:none;border:none;cursor:pointer;font-family:inherit;padding:0;
}
.nav-links button:hover{opacity:1;}
.nav-links button.on{opacity:1;font-weight:600;}
@media(max-width:680px){ .nav-links{gap:16px;} .nav-links button{font-size:11px;} }
@media(max-width:480px){ .nav-links button:nth-child(n+5){display:none;} }

/* ════════ HERO ════════ */
.hero{
  padding:96px 22px 64px;text-align:center;
  background:linear-gradient(180deg,#fbfbfd,var(--white));
}
.hero .eyebrow{
  font-size:19px;font-weight:600;color:var(--gray-1);letter-spacing:.2px;margin-bottom:8px;
}
.hero h1{
  font-size:clamp(44px,9vw,80px);font-weight:700;letter-spacing:-.03em;line-height:1.05;
  color:var(--black);
}
.hero .sub{
  margin-top:16px;font-size:21px;color:var(--gray-1);font-weight:400;
}
.hero .dates{
  margin-top:28px;display:inline-flex;gap:8px;align-items:center;
  font-size:14px;color:var(--gray-2);font-weight:500;letter-spacing:.2px;
}
.hero .dates b{color:var(--black);}

.countdown{
  margin-top:36px;display:inline-flex;gap:36px;
}
.cd-unit{text-align:center;}
.cd-num{
  font-size:40px;font-weight:700;letter-spacing:-.02em;color:var(--black);
  font-variant-numeric:tabular-nums;display:block;line-height:1;
}
.cd-lbl{font-size:12px;color:var(--gray-2);margin-top:6px;letter-spacing:.3px;}
.cd-today{font-size:17px;font-weight:600;color:var(--blue);}

/* ════════ PROGRESS PILL (sticky under nav, Apple-style understated) ════════ */
.progress-wrap{
  position:sticky;top:48px;z-index:400;
  background:rgba(255,255,255,.85);backdrop-filter:blur(14px) saturate(180%);
  border-bottom:1px solid var(--line);
  padding:10px 22px;display:flex;align-items:center;justify-content:center;gap:12px;
}
.progress-track{
  width:200px;height:4px;background:var(--gray-bg);border-radius:4px;overflow:hidden;
}
.progress-fill{height:100%;background:var(--blue);width:0;transition:width .5s cubic-bezier(.4,0,.2,1);}
.progress-label{font-size:12px;color:var(--gray-1);font-weight:500;white-space:nowrap;}

/* ════════ CHECKLIST ════════ */
.ev{position:relative;}
.ev-check{
  position:absolute;left:-30px;top:18px;width:18px;height:18px;border-radius:50%;
  border:1.5px solid var(--line);background:var(--white);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;
  transition:all .15s;
}
.ev-check:hover{border-color:var(--blue);}
.ev.done .ev-check{background:var(--blue);border-color:var(--blue);}
.ev.done .ev-title{color:var(--gray-2);text-decoration:line-through;}
.ev.done .ev-note{opacity:.55;}
.day-main{padding-left:30px;}
@media(max-width:680px){ .day-main{padding-left:26px;} .ev-check{left:-26px;} }

/* ════════ TODAY HIGHLIGHT ════════ */
.day-row.is-today{
  background:linear-gradient(180deg,rgba(0,113,227,.04),transparent 70%);
  margin-left:-22px;margin-right:-22px;padding-left:22px;padding-right:22px;
  border-radius:0 0 20px 20px;
}
.today-chip{
  display:inline-flex;align-items:center;gap:5px;background:var(--blue);color:#fff;
  font-size:11px;font-weight:600;padding:4px 11px;border-radius:980px;margin-top:14px;
  letter-spacing:.2px;
}

#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:900;}

/* ════════ SEARCH ════════ */
.search-wrap{
  max-width:980px;margin:0 auto;padding:14px 22px 0;
}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--gray-bg);border-radius:12px;
  padding:9px 14px;
}
.search-box input{
  border:none;outline:none;background:none;flex:1;font-size:14px;color:var(--black);
  font-family:inherit;
}
.search-box input::placeholder{color:var(--gray-2);}
.search-box .sicon{color:var(--gray-2);font-size:13px;}
.search-clear{background:none;border:none;color:var(--gray-2);cursor:pointer;font-size:13px;display:none;padding:0;}
.search-active .search-clear{display:block;}
.no-match{display:none;text-align:center;padding:60px 0;color:var(--gray-2);font-size:15px;}
.ev.filtered-out{display:none;}

/* ════════ CONTROL DOCK ════════ */
.dock{position:fixed;bottom:20px;right:20px;z-index:950;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.dock-fab{
  width:48px;height:48px;border-radius:50%;background:var(--black);color:var(--white);
  border:none;font-size:19px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.22);
  display:flex;align-items:center;justify-content:center;transition:transform .2s;
}
.dock-fab:hover{transform:scale(1.06);}

.panel{
  background:var(--white);border-radius:18px;
  box-shadow:0 16px 50px rgba(0,0,0,.18);border:1px solid var(--line);
  padding:20px;width:270px;display:none;
  animation:popIn .18s ease;
}
.panel.show{display:block;}
@keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.97);}to{opacity:1;transform:none;}}
.panel h3{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-1);margin-bottom:10px;}
.panel h3:not(:first-child){margin-top:18px;}

.swatches{display:flex;gap:10px;}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;position:relative;}
.swatch:hover{transform:scale(1.1);}
.swatch.on{border-color:var(--black);}
.swatch.on::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;}

.mode-toggle{display:flex;background:var(--gray-bg);border-radius:10px;padding:3px;gap:3px;}
.mode-btn{flex:1;padding:7px 0;border:none;background:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--gray-1);font-family:inherit;}
.mode-btn.on{background:var(--white);color:var(--black);box-shadow:0 1px 4px rgba(0,0,0,.1);}

.fs-row{display:flex;align-items:center;gap:10px;}
.fs-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--white);cursor:pointer;font-size:12px;font-weight:600;color:var(--black);}
.fs-val{flex:1;text-align:center;font-size:12px;color:var(--gray-1);}

.panel-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:13px;}
.panel-row button{background:none;border:none;color:var(--blue);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}

/* ════════ PINNED DRAWER ════════ */
.pinned-drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:980;
  background:var(--white);border-top:1px solid var(--line);
  box-shadow:0 -10px 36px rgba(0,0,0,.14);
  max-height:65vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .3s ease;
  border-radius:20px 20px 0 0;
}
.pinned-drawer.show{transform:translateY(0);}
.pd-handle{padding:16px 22px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);}
.pd-handle h3{font-size:17px;font-weight:600;}
.pd-close{background:none;border:none;font-size:18px;color:var(--gray-2);cursor:pointer;}
.pd-body{padding:10px 22px 28px;}
.pd-item{padding:12px 0;border-bottom:1px solid var(--line);font-size:14px;}
.pd-item:last-child{border-bottom:none;}
.pd-item .pd-day{font-size:11px;color:var(--blue);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:2px;}
.pd-empty{text-align:center;color:var(--gray-2);padding:36px 0;font-size:14px;}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:970;opacity:0;pointer-events:none;transition:opacity .3s;}
.scrim.show{opacity:1;pointer-events:auto;}

/* pin button on each event */
.ev-pin{
  position:absolute;right:0;top:18px;width:20px;height:20px;border:none;background:none;
  cursor:pointer;color:var(--line);font-size:14px;transition:color .15s,transform .15s;
}
.ev-pin:hover{transform:scale(1.15);}
.ev-pin.pinned{color:#ff9500;}

/* ════════ MEMO ════════ */
.memo-box{margin-top:28px;}
.memo-box textarea{
  width:100%;min-height:56px;resize:vertical;
  border:1px solid var(--line);border-radius:12px;background:var(--gray-bg);
  padding:11px 13px;font-family:inherit;font-size:13.5px;color:var(--black);
  outline:none;transition:border-color .15s;
}
.memo-box textarea:focus{border-color:var(--blue);}
.memo-box textarea::placeholder{color:var(--gray-2);}
.memo-label{font-size:11px;color:var(--gray-2);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;display:block;}

@media(max-width:480px){
  .panel{width:calc(100vw - 48px);max-width:280px;}
  .dock{bottom:16px;right:16px;}
}

/* ════════ SECTION SCAFFOLDING ════════ */
section{max-width:980px;margin:0 auto;padding:0 22px;}
.section-pad{padding-top:90px;padding-bottom:90px;scroll-margin-top:90px;}
.section-head{text-align:center;margin-bottom:56px;}
.section-head .k{font-size:13px;font-weight:600;color:var(--blue);letter-spacing:.3px;margin-bottom:10px;text-transform:uppercase;}
.section-head h2{font-size:clamp(32px,5vw,48px);font-weight:700;letter-spacing:-.02em;color:var(--black);}
.section-head p{margin-top:14px;font-size:17px;color:var(--gray-1);max-width:560px;margin-inline:auto;}

.divider-full{border-top:1px solid var(--line);}

/* ════════ DAY ROW (large editorial) ════════ */
.day-row{
  display:grid;grid-template-columns:200px 1fr;gap:48px;
  padding:64px 0;border-top:1px solid var(--line);
  scroll-margin-top:96px;
}
.day-row:first-child{border-top:none;}
.day-side{position:sticky;top:90px;align-self:start;}
.day-num{font-size:64px;font-weight:800;letter-spacing:-.03em;color:var(--black);line-height:1;}
.day-date{font-size:14px;color:var(--gray-1);font-weight:500;margin-top:6px;}
.day-hotel-tag{
  display:inline-flex;align-items:center;gap:6px;margin-top:16px;
  font-size:12px;color:var(--gray-1);background:var(--gray-bg);
  padding:6px 12px;border-radius:980px;font-weight:500;
}
.day-title{
  font-size:clamp(24px,3.4vw,32px);font-weight:700;letter-spacing:-.01em;
  margin-bottom:36px;color:var(--black);max-width:560px;line-height:1.25;
}

/* ════════ TIMELINE ITEMS ════════ */
.ev{
  display:grid;grid-template-columns:64px 1fr;gap:18px;
  padding:18px 26px 18px 0;border-top:1px solid var(--line);
}
.ev:first-child{border-top:none;}
.ev-time{
  font-size:13px;font-weight:600;color:var(--black);padding-top:2px;
  font-variant-numeric:tabular-nums;
}
.ev-title{font-size:16px;font-weight:500;color:var(--black);line-height:1.5;}
.ev-note{font-size:14px;color:var(--gray-1);margin-top:6px;line-height:1.55;}
.ev-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.pill{
  font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:980px;
}
.pill-tel{background:var(--gray-bg);color:var(--black);}
.pill-warn{background:#fff2e0;color:#a35a00;}
.pill-note{background:var(--gray-bg);color:var(--gray-1);}

/* split */
.split-wrap{margin-top:8px;}
.split-cols{display:grid;grid-template-columns:1fr 1fr;gap:40px;}
.split-h{
  font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  color:var(--gray-1);padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:4px;
}
@media(max-width:680px){
  .day-row{grid-template-columns:1fr;gap:20px;}
  .day-side{position:static;display:flex;align-items:baseline;gap:14px;}
  .day-num{font-size:40px;}
  .split-cols{grid-template-columns:1fr;gap:0;}
  .split-cols .split-col:last-child{margin-top:24px;}
}

/* ════════ MAP SECTION ════════ */
.map-dark{background:var(--black);color:var(--white);}
.map-dark .section-head h2{color:var(--white);}
.map-dark .section-head p{color:rgba(255,255,255,.56);}
.map-dark .section-head .k{color:#2997ff;}

.map-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:1px;background:rgba(255,255,255,.1);
  border-radius:18px;overflow:hidden;
}
.map-card{
  background:#1d1d1f;padding:28px 26px;transition:background .2s;
}
.map-card:hover{background:#2b2b2d;}
.map-card .mc-day{font-size:11px;font-weight:600;color:#2997ff;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.map-card .mc-name{font-size:18px;font-weight:600;color:var(--white);line-height:1.3;}
.map-card .mc-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:6px;}
.map-card .mc-link{
  display:inline-flex;align-items:center;gap:6px;margin-top:16px;
  font-size:13px;font-weight:500;color:#2997ff;
}
.map-card .mc-link::after{content:'→';transition:transform .15s;}
.map-card:hover .mc-link::after{transform:translateX(3px);}

/* ════════ RESERVATIONS ════════ */
.res-table{border-top:1px solid var(--line);}
.res-row{
  display:grid;grid-template-columns:80px 1fr 150px 130px 100px;gap:18px;
  align-items:center;padding:20px 0;border-bottom:1px solid var(--line);
}
.res-row.head{
  font-size:11px;font-weight:600;color:var(--gray-1);text-transform:uppercase;
  letter-spacing:.4px;padding-top:0;
}
.res-day-tag{font-size:13px;font-weight:600;color:var(--black);}
.res-name{font-size:15px;font-weight:500;color:var(--black);}
.res-name .res-detail{display:block;font-size:13px;color:var(--gray-1);font-weight:400;margin-top:2px;}
.res-tel{font-size:14px;color:var(--gray-1);font-variant-numeric:tabular-nums;}
.res-id{
  font-family:'SF Mono',ui-monospace,Menlo,monospace;font-size:13px;color:var(--black);
  background:var(--gray-bg);padding:4px 9px;border-radius:6px;display:inline-block;
  letter-spacing:.2px;cursor:pointer;transition:background .15s;
}
.res-id:hover{background:#e8e8ed;}
.res-id.copied{background:#e8f8ec;color:#1c7a37;}
.status{
  display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:980px;
}
.status::before{content:'';width:6px;height:6px;border-radius:50%;}
.status-confirmed{background:#e8f8ec;color:#1c7a37;}
.status-confirmed::before{background:#34c759;}
.status-check{background:#fff2e0;color:#a35a00;}
.status-check::before{background:#ff9500;}

@media(max-width:680px){
  .res-row{grid-template-columns:1fr;gap:6px;padding:18px 0;}
  .res-row.head{display:none;}
  .res-day-tag{order:-1;}
}

/* ════════ FOOTER ════════ */
.footer{
  background:var(--gray-bg);padding:50px 22px;text-align:center;
  border-top:1px solid var(--line);
}
.footer p{font-size:12px;color:var(--gray-2);}
.footer .heart{margin-top:6px;font-size:13px;color:var(--gray-1);}

/* focus */
a:focus-visible,.nav-links button:focus-visible{outline:2px solid var(--blue);outline-offset:3px;border-radius:3px;}

@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;}}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo">沖縄 2026</div>
    <div class="nav-links" id="navLinks">
      <button type="button" data-target="day0">Day 1</button>
      <button type="button" data-target="day1">Day 2</button>
      <button type="button" data-target="day2">Day 3</button>
      <button type="button" data-target="day3">Day 4</button>
      <button type="button" data-target="day4">Day 5</button>
      <button type="button" data-target="map">マップ</button>
      <button type="button" data-target="reservations">予約</button>
    </div>
  </div>
</nav>

<div class="progress-wrap">
  <span class="progress-label" id="progressLabel">0% 完了</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="hero">
  <div class="eyebrow">Family Itinerary</div>
  <h1>沖縄。</h1>
  <p class="sub">5日間、すべてが決まっている旅。</p>
  <div class="dates"><b>7月14日</b> — <b>7月18日</b>　·　2026</div>
  <div class="countdown" id="countdown"></div>
</div>

<div class="search-wrap">
  <div class="search-box" id="searchBox">
    <span class="sicon">🔍</span>
    <input id="searchInput" type="text" placeholder="予定・場所・電話番号を検索">
    <button class="search-clear" id="searchClear" type="button">✕</button>
  </div>
</div>

<section class="section-pad" id="itinerary">
  <div id="dayRows"></div>
</section>
<div class="no-match" id="noMatch">該当する予定が見つかりません。</div>

<section class="map-dark section-pad" id="map">
  <div class="section-head">
    <div class="k">Map</div>
    <h2>すべての行き先。</h2>
    <p>タップすると、その場所をGoogleマップで開きます。</p>
  </div>
  <div class="map-grid" id="mapGrid"></div>
</section>

<section class="section-pad" id="reservations">

function todayISO(){ return new Date().toISOString().slice(0,10); }
function todayDayIndex(){ return TRIP_DATE_MAP.indexOf(todayISO()); }

/* ════════ RENDER: DAY ROWS ════════ */
function evHTML(ev, key){
  const meta = [];
  if(ev.warn) meta.push(`<span class="pill pill-warn">${ev.warn}</span>`);
  if(ev.tel) meta.push(`<span class="pill pill-tel">☎ ${ev.tel}</span>`);
  const done = !!CHECKED[key];
  const pinned = !!PINNED[key];
  const searchText = (ev.txt+' '+(ev.note||'')+' '+(ev.tel||'')).toLowerCase();
  return `<div class="ev${done?' done':''}" data-key="${key}" data-search="${searchText}">
    <button class="ev-check" data-key="${key}" type="button">${done?'✓':''}</button>
    <button class="ev-pin${pinned?' pinned':''}" data-key="${key}" type="button">${pinned?'★':'☆'}</button>
    <div class="ev-time">${ev.t}</div>
    <div>
      <div class="ev-title">${ev.txt}</div>
      ${ev.note?`<div class="ev-note">${ev.note}</div>`:''}
      ${meta.length?`<div class="ev-meta">${meta.join('')}</div>`:''}
    </div>
  </div>`;
}

function dayRowHTML(d,i){
  const isToday = (i === todayDayIndex());
  let body;
  if(d.split){
    body = `
      <div class="split-wrap">
        <div class="split-cols">
          <div class="split-col">
            <div class="split-h">父・母ルート</div>
            ${d.parents.map((e,j)=>evHTML(e,`d${i}-p${j}`)).join('')}
          </div>
          <div class="split-col">
            <div class="split-h">良太ルート</div>
            ${d.ryota.map((e,j)=>evHTML(e,`d${i}-r${j}`)).join('')}
          </div>
        </div>
      </div>`;
  } else {
    body = d.events.map((e,j)=>evHTML(e,`d${i}-e${j}`)).join('');
  }
  return `
    <div class="day-row${isToday?' is-today':''}" id="day${i}">
      <div class="day-side">
        <div class="day-num">${d.num}</div>
        <div class="day-date">${d.date}</div>
        ${d.hotel?`<div class="day-hotel-tag">⌂ ${d.hotel}</div>`:''}
        ${isToday?`<div class="today-chip">📍 今日</div>`:''}
      </div>
      <div class="day-main">
        <div class="day-title">${d.title}</div>
        ${body}
        <div class="memo-box">
          <span class="memo-label">✎ メモ</span>
          <textarea data-memo="${i}" placeholder="この日について気になることをメモ…">${MEMOS[i]||''}</textarea>
        </div>
      </div>
    </div>`;
}

  const val = el.dataset.copy;
  if(val === '電話確認制') return;
  navigator.clipboard?.writeText(val).catch(()=>{});
  const original = el.textContent;
  el.textContent = 'コピーしました';
  el.classList.add('copied');
  setTimeout(()=>{ el.textContent = original; el.classList.remove('copied'); }, 1400);
});

    e.preventDefault();
    e.stopPropagation();
    const target = sectionEls[idx];
    if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
    // defensively strip any hash the platform may have appended
    if(window.location.hash && history.replaceState){
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
    return false;
  });
});

const sections = sectionEls;
const io = new IntersectionObserver(entries=>{
  entries.forEach(en=>{
    if(en.isIntersecting){
      const idx = sections.indexOf(en.target);
      navLinks.forEach((a,j)=>a.classList.toggle('on', j===idx));
    }
  });
},{threshold:0,rootMargin:'-45% 0px -50% 0px'});
sections.forEach(s=>s && io.observe(s));

/* ════════ COUNTDOWN ════════ */
function renderCountdown(){
  const now = new Date();
  const tripStart = new Date('2026-07-14T00:00:00+09:00');
  const tripEnd = new Date('2026-07-18T23:59:59+09:00');
  const el = document.getElementById('countdown');
  if(now > tripEnd){ el.style.display='none'; return; }
  if(now >= tripStart && now <= tripEnd){
    el.innerHTML = `<div class="cd-unit"><span class="cd-today">📍 旅行中です</span></div>`;
    return;
  }
  const diffMs = tripStart - now;
  const days = Math.floor(diffMs/86400000);
  const hours = Math.floor((diffMs%86400000)/3600000);
  el.innerHTML = `
    <div class="cd-unit"><span class="cd-num">${days}</span><span class="cd-lbl">days</span></div>
    <div class="cd-unit"><span class="cd-num">${hours}</span><span class="cd-lbl">hours</span></div>
    <div class="cd-unit"><span class="cd-num">to go</span><span class="cd-lbl">出発まで</span></div>
  `;
}
renderCountdown();
setInterval(renderCountdown, 60000);

/* ════════ PROGRESS + CHECKLIST ════════ */
function updateProgress(){
  const all = document.querySelectorAll('.ev');
  const done = document.querySelectorAll('.ev.done');
  const pct = all.length ? Math.round(done.length/all.length*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = pct===100 ? '旅程、すべて完了。' : pct+'% 完了';
  if(pct===100) fireConfetti();
}
updateProgress();

document.getElementById('dayRows').addEventListener('click', e=>{
  const checkBtn = e.target.closest('.ev-check');
  const pinBtn = e.target.closest('.ev-pin');
  if(checkBtn){
    const key = checkBtn.dataset.key;
    const willDone = !CHECKED[key];
    CHECKED[key] = willDone;
    saveState();
    const evEl = checkBtn.closest('.ev');
    evEl.classList.toggle('done', willDone);
    checkBtn.textContent = willDone ? '✓' : '';
    updateProgress();
  }
  if(pinBtn){
    const key = pinBtn.dataset.key;
    const willPin = !PINNED[key];
    PINNED[key] = willPin;
    saveState();
    pinBtn.classList.toggle('pinned', willPin);
    pinBtn.textContent = willPin ? '★' : '☆';
    renderPinnedDrawer();
  }
});

document.getElementById('dayRows').addEventListener('input', e=>{
  if(e.target.dataset.memo !== undefined){
    MEMOS[e.target.dataset.memo] = e.target.value;
    saveState();
  }
});

/* ════════ CONFETTI (fires once, on full completion) ════════ */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);
let confettiFired = false;
function fireConfetti(){
  if(confettiFired) return;
  confettiFired = true;
  const colors = ['#0071e3','#34c759','#ff9500','#ff3b30','#1d1d1f'];
  const particles = Array.from({length:90},()=>({
    x: innerWidth/2 + (Math.random()-0.5)*220,
    y: innerHeight*0.25,
    vx:(Math.random()-0.5)*8, vy:Math.random()*-9-3,
    size:Math.random()*6+4, color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*360, vr:(Math.random()-0.5)*12, life:100
  }));
  let frame=0;
  function tick(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.25; p.rot+=p.vr; p.life--;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.life/100); ctx.fillStyle=p.color;
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      ctx.restore();
    });
    if(frame<100) requestAnimationFrame(tick);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  tick();
}

/* ════════ DOCK / PANEL ════════ */
const dockFab = document.getElementById('dockFab');
const panel = document.getElementById('panel');
dockFab.addEventListener('click', ()=>{ panel.classList.toggle('show'); });

/* Theme swatches */
const THEMES = [
  {k:'blue', c:'#0071e3'},
  {k:'green', c:'#1d8a3e'},
  {k:'orange', c:'#d9650f'},
  {k:'pink', c:'#c4427a'},
  {k:'purple', c:'#7d5ec4'},

  `<button class="swatch${THEME===t.k?' on':''}" type="button" style="background:${t.c}" data-theme="${t.k}"></button>`

/* Mode toggle */
function applyMode(){
  document.documentElement.setAttribute('data-mode', MODE);
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('on', b.dataset.mode===MODE));
}

/* Font size */
function applyFontSize(){
  document.documentElement.style.setProperty('--fs-scale', FS);
  document.getElementById('fsVal').textContent = Math.round(FS*100)+'%';
}
document.getElementById('fsUp').addEventListener('click', ()=>{
  FS = Math.min(1.4, +(FS+0.1).toFixed(2));
  saveState(); applyFontSize();
});

});

/* ════════ SEARCH ════════ */
const searchInput = document.getElementById('searchInput');
const searchBox = document.getElementById('searchBox');
const searchClear = document.getElementById('searchClear');
function runSearch(q){
  q = q.trim().toLowerCase();
  const hasQuery = q.length > 0;
  searchBox.classList.toggle('search-active', hasQuery);
  let anyMatch = false;
  document.querySelectorAll('.day-row').forEach(row=>{
    const evs = row.querySelectorAll('.ev');
    let rowMatch = !hasQuery;
    evs.forEach(ev=>{
      const match = !hasQuery || ev.dataset.search.includes(q);
      ev.classList.toggle('filtered-out', !match);
      if(match) rowMatch = true;
    });
    row.style.display = rowMatch ? '' : 'none';
    if(rowMatch) anyMatch = true;
  });
  document.getElementById('noMatch').style.display = (hasQuery && !anyMatch) ? 'block' : 'none';
}
searchInput.addEventListener('input', e=> runSearch(e.target.value));
searchClear.addEventListener('click', ()=>{ searchInput.value=''; runSearch(''); searchInput.focus(); });

/* ════════ PINNED DRAWER ════════ */
const pinnedDrawer = document.getElementById('pinnedDrawer');
const scrim = document.getElementById('scrim');
function openDrawer(){ pinnedDrawer.classList.add('show'); scrim.classList.add('show'); }
function closeDrawer(){ pinnedDrawer.classList.remove('show'); scrim.classList.remove('show'); }
document.getElementById('openPinned').addEventListener('click', ()=>{
  renderPinnedDrawer(); openDrawer(); panel.classList.remove('show');
});
document.getElementById('pdClose').addEventListener('click', closeDrawer);
scrim.addEventListener('click', closeDrawer);

function renderPinnedDrawer(){
  const pinnedKeys = Object.keys(PINNED).filter(k=>PINNED[k]);
  const body = document.getElementById('pdBody');
  if(!pinnedKeys.length){
    body.innerHTML = `<div class="pd-empty">まだピン留めがありません。☆ アイコンをタップして大事な予定を集めましょう。</div>`;
    return;
  }
  body.innerHTML = pinnedKeys.map(key=>{
    const evEl = document.querySelector(`.ev[data-key="${key}"]`);
    if(!evEl) return '';
    const dayIdx = key.split('-')[0].replace('d','');
    const day = DAYS[+dayIdx];
    const title = evEl.querySelector('.ev-title').textContent;
    const time = evEl.querySelector('.ev-time').textContent;
    return `<div class="pd-item"><div class="pd-day">Day ${day.num} ・ ${day.date}</div><strong>${time}</strong> — ${title}</div>`;
  }).join('');
}
</script>
